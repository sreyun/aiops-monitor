# Agent 配置文件示例（YAML 版）—— 与 config.example.json 等价，二选一即可。
# 将本文件复制为 config.yaml（或 config.yml）放到 agent 同目录，或用 --config 指定路径。
# Agent 按扩展名自动识别：.yaml/.yml 走 YAML，.json 走 JSON。修改后需重启 Agent。
# 字段含义与 config.example.json 完全一致（复用同一套 json tag）。

# ===== 基础配置 =====
server: "http://localhost:8529"
report_interval: 30        # 基础指标上报间隔(秒)，默认30；需更实时可下调如10
plugin_interval: 60        # 插件执行周期(秒)，默认60
disk_path: "/"
plugins_dir: "plugins"
python: "python3"
state_file: "agent_state.json"
category: ""

# ===== 多服务端（可选，配置后优先于 server/token）=====
# servers:
#   - server: "https://aiops.example.com"
#     token: "your-install-token"

