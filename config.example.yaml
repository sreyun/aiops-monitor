# ====== SNI/DNS 抓取：目的 IP → 真实域名（可选，仅 Linux，需 root/CAP_NET_RAW）======
# 被动抓取【明文】的 TLS SNI 与 DNS 应答，把流量里的裸目的 IP 显示成用户实际访问的域名
# （如 api.openai.com / 内网 ollama），用于"谁在访问哪个大模型/网站"的可见性。不解密任何内容。
# ⚠ 合规：属流量审计范畴，只在你有授权的自有/企业网络启用，并对用户履行告知义务。默认关闭。
# ⚠ 资源：ETH_P_ALL 抓全部包，高流量网关建议指定 interface；后续会加 BPF 过滤降 CPU。
# sni_dns_capture:
#   enabled: false
#   interface: ""            # 空=所有网卡；高流量建议指定，如 "eth0"
#   max_entries_per_min: 5000
#   # ---- Phase 2 · 明文 HTTP 内容审计（⚠ 高敏感，默认关闭）----
#   # 抓【明文】HTTP 请求的 请求行/Host/body 前缀，用于审计"谁向哪个大模型端点发了什么 prompt"。
#   # 只对未加密 HTTP 有效（内网自建大模型 Ollama/vLLM 常是明文）；云端 HTTPS 到不了这里。
#   # ⚠ 合规：body 可能含用户 PII，仅在你有授权的网络启用并履行告知义务；服务端保留 30 天后自动清理。
#   content_audit: false
#   content_audit_ports: [11434, 8000, 8080]   # 目的端口白名单；空=对所有 TCP 试探 HTTP
#   content_audit_max_body: 4096               # body 截断上限(字节)
