#       retries: 2                    # 默认 2
#       max_repetitions: 10           # GETBULK 每次条数，默认 10
#       interfaces: []                # 指定 ifIndex，空=全部
#       include_down: false           # 是否采 admin-down 口（默认否，控噪+控基数）
#       max_interfaces: 200           # 接口数上限，默认 200
#     - name: "edge-router-v3"        # v3 USM 示例（authPriv）
#       ip: "10.0.0.2"
#       version: "3"
