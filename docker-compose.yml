# ============================================================
# AIOps Monitor · Docker Compose（单容器模式）
# ------------------------------------------------------------
# Go 二进制内嵌前端（//go:embed），单容器即可运行
#
# 使用方式：
#   docker compose up -d                # 启动
#   docker compose up -d --build        # 重新构建并启动
#   docker compose logs -f              # 查看日志
#   docker compose down                 # 停止
#
# 端口说明：
#   - 8529: Web UI 和 API 端口
#   - 10000-10099: TCP 端口转发监听范围（默认 100 个端口）
# ============================================================

services:
  aiops-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: server
    container_name: aiops-server
    stop_grace_timeout: 30s  # v5.2.8: allow DB flush on shutdown (default 10s too short)
    ports:
      - "8529:8529"
      # TCP 端口转发监听范围（默认 10000-10099，共 100 个端口）
      # 如需更多端口，可扩展范围，但建议不超过 500 个
      - "10000-10099:10000-10099"
    volumes:
      - server-data:/app/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

  # 取消注释即可启用本机 Agent
  # aiops-agent:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile
  #     target: agent
  #   container_name: aiops-agent
  #   depends_on:
  #     - aiops-server
  #   environment:
  #     - TZ=Asia/Shanghai
  #   restart: unless-stopped

volumes:
  server-data:
