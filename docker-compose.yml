# ============================================================
# AIOps Monitor · Docker Compose（单容器模式）
# ------------------------------------------------------------
# Go 二进制内嵌前端（//go:embed），单容器即可运行
#
# 使用方式：
#   docker compose up -d                # 启动
#   docker compose up -d --build        # 重新构建并启动
#   docker compose logs -f              # 查看日志
#   docker compose down                 # 停止
#
# 端口说明：
#   - 8529: Web UI 和 API 端口
#   - 10000-10099: TCP 端口转发监听范围（默认 100 个端口）
# ============================================================

services:
  aiops-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: server
    container_name: aiops-server
    ports:
      - "8529:8529"
      # TCP 端口转发监听范围（默认 10000-10099，共 100 个端口）
      # 如需更多端口，可扩展范围，但建议不超过 500 个
      - "10100-10300:10100-10300"
    volumes:
      - server-data:/app/data
    environment:
      - TZ=Asia/Shanghai
      # v5.4.1: TCP 转发默认监听 127.0.0.1（仅容器内可访问），Docker 部署
      # 必须设为 0.0.0.0 才能让宿主机/其他容器访问转发的端口。
      # 也可以通过挂载 server_config.json 设置 forward_listen 字段。
      - AIOPS_FORWARD_LISTEN=0.0.0.0
      # 可选：转发端口范围（需与 ports 映射一致）
      # - AIOPS_FORWARD_PORT_RANGE=10000-10099
      # 可选：中继节点共享密钥（与 Agent 端 relay-secret 一致）
      # - AIOPS_RELAY_SECRET=your-shared-secret
    restart: unless-stopped

  # 取消注释即可启用本机 Agent
  # aiops-agent:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile
  #     target: agent
  #   container_name: aiops-agent
  #   depends_on:
  #     - aiops-server
  #   environment:
  #     - TZ=Asia/Shanghai
  #   restart: unless-stopped

volumes:
  server-data:
