services:
  aiops-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    container_name: aiops-server
    ports:
      - "8529:8529"
    volumes:
      - server-data:/app/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

  # 取消注释即可启用本机 Agent
  # aiops-agent:
