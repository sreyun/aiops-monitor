# ============================================================
# AIOps Monitor · Docker Compose
# ------------------------------------------------------------
# 服务组成：
#   - aiops-server      : Go 单容器（内嵌前端），Web/API 端口 8529
#   - victoriametrics   : 时序指标库（全部指标/趋势，server 通过 remote-write 写入）
#   - postgres          : 关系库（配置/用户/审计/事件/工单/会话统一持久化）
#
# 存储说明：内置 aiops.db 已彻底停用；server 强制要求 PostgreSQL + VictoriaMetrics，
#          未配置二者之一将拒绝启动（不再回落本地单文件库）。
#
# 数据持久化：
#   - ./data            : 本地目录映射，仅存放 recordings/（终端会话录制，重启不丢）
#                         及可选 TLS 证书；配置/关系数据已全部落 PG
#   - ./vm-data / ./pg-data : 本地目录映射，存放 VM / PostgreSQL 数据
#
# 使用方式：
#   docker compose up -d --build     # 构建并启动
#   docker compose logs -f           # 查看日志
#   docker compose down              # 停止（数据保留；加 -v 才会删卷）
#
# 端口：
#   - 8529            : Web UI / API
#   - 8428            : VictoriaMetrics UI / PromQL（可选，仅内网建议）
#   - 10100-10300     : TCP 端口转发监听范围
# ============================================================

services:
  aiops-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: server
    container_name: aiops-server
    ports:
      - "8529:8529"
      - "10100-10300:10100-10300"
    volumes:
      # 本地目录映射：配置 / 内嵌库 / 终端录制(recordings/) 均落此目录 → 重启不丢
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      # Docker 部署下 TCP 转发需监听 0.0.0.0 才能被宿主机/其它容器访问
      - AIOPS_FORWARD_LISTEN=0.0.0.0
      # 时序指标写入 VictoriaMetrics（remote-write / Prometheus import）
      - AIOPS_VM_URL=http://victoriametrics:8428
      # 关系数据（配置/用户/审计/事件/工单/会话）持久化到 PostgreSQL
      # ⚠️ 生产请改密码，并与 postgres 服务保持一致；如需服务端↔PG 加密可改 sslmode=require（需 PG 侧配置证书）
      - AIOPS_POSTGRES_DSN=postgres://aiops:h3Y7Vmb1CZBOApZM86D@postgres:5432/aiops?sslmode=disable
      # 可选：启用 HTTPS/TLS 加密传输（把证书/私钥挂到 ./data/tls 后取消注释；否则明文 HTTP，建议置于 TLS 终止代理之后）
      # - AIOPS_TLS_CERT=/app/data/tls/server.crt
      # - AIOPS_TLS_KEY=/app/data/tls/server.key
      # 配置落库主密钥：对 MFA/SMTP/AI/webhook/relay 等敏感密钥做 AES-256-GCM 静态加密（已默认启用）
      # ⚠️ 生产务必改成你自己的长随机串，并妥善备份——丢失此密钥将无法解密库中已加密的凭据！
      - AIOPS_SECRET_KEY=aiops-K7p2mQ9vR4xN8wZ3bY6dF1hJ5sL0tGc-CHANGE-ME-2026
    depends_on:
      victoriametrics:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  victoriametrics:
    # image: victoriametrics/victoria-metrics:latest
    image: swr.cn-east-3.myhuaweicloud.com/sreyun/docker.io/victoriametrics/victoria-metrics:latest
    container_name: aiops-vm
    command:
      - "-storageDataPath=/vmdata"
      - "-retentionPeriod=36"        # 指标保留 12 个月，可按需调整
      - "-httpListenAddr=:8428"
    #ports:
    #  - "8428:8428"                  # 可选：直接访问 VM 的 UI / PromQL（仅内网建议）
    volumes:
      - ./vm-data:/vmdata
    restart: unless-stopped

  postgres:
    # image: postgres:18-alpine
    image: swr.cn-east-3.myhuaweicloud.com/sreyun/docker.io/postgres:18-alpine
    container_name: aiops-pg
    environment:
      - POSTGRES_USER=aiops
      - POSTGRES_PASSWORD=h3Y7Vmb1CZBOApZM86D   # ⚠️ 生产环境务必修改，并同步上方 AIOPS_POSTGRES_DSN
      - POSTGRES_DB=aiops
      - TZ=Asia/Shanghai
    volumes:
      - ./pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiops -d aiops"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 取消注释即可启用本机 Agent（采集本容器/宿主指标）
  # aiops-agent:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile
  #     target: agent
  #   container_name: aiops-agent
  #   depends_on:
  #     - aiops-server
  #   environment:
  #     - TZ=Asia/Shanghai
  #     # 采集日志文件（逗号分隔）：
  #     # command: ["--server", "http://aiops-server:8529", "--log-paths", "/var/log/syslog"]
  #   restart: unless-stopped
