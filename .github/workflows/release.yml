name: Release · Build & Push to Huawei SWR

# 每次推送 v* 标签（如 v5.5.0）→ 自动构建多架构镜像并推送到华为云 SWR。
# 也可在 Actions 页手动触发（workflow_dispatch）并指定 tag 做补推。
#
# ── 需要在 仓库 Settings → Secrets and variables → Actions 配置两个 Secret ──
#   HW_ACCESS_KEY  =  <华为云访问密钥 AK>           （IAM「我的凭证」获取）
#   HW_SECRET_KEY  =  <华为云秘密密钥 SK>           （同上）
#
#   登录密钥由 AK/SK 在 CI 中自动生成，无需手动计算。
#
#   另需在 SWR 控制台的 sreyun 组织下预先创建镜像仓库 aiops-server 与 aiops-agent
#   （或将组织设为允许自动创建）。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像版本标签（如 v5.5.0）'
        required: true
      push_latest:
        description: '同时更新 :latest 标签'
        type: boolean
        default: true

env:
  SWR_REGISTRY: swr.cn-east-3.myhuaweicloud.com
  SWR_NAMESPACE: sreyun
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version + tag list
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
            LATEST="${{ github.event.inputs.push_latest }}"
          else
            VERSION="${GITHUB_REF_NAME}"
            LATEST="true"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "解析到版本: $VERSION (latest=$LATEST)"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate SWR login credential
        id: swr-login
        run: |
          SWR_USERNAME="cn-east-3@${{ secrets.HW_ACCESS_KEY }}"
          SWR_PASSWORD=$(printf '%s' "${{ secrets.HW_ACCESS_KEY }}" | openssl dgst -binary -sha256 -hmac "${{ secrets.HW_SECRET_KEY }}" | od -An -vtx1 | tr -d ' \n')
          echo "username=$SWR_USERNAME" >> "$GITHUB_OUTPUT"
          echo "password=$SWR_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Log in to Huawei SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SWR_REGISTRY }}
          username: ${{ steps.swr-login.outputs.username }}
          password: ${{ steps.swr-login.outputs.password }}

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: server
          platforms: ${{ env.PLATFORMS }}
          push: true
          provenance: false
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BASE_REGISTRY=docker.io
          tags: |
            ${{ env.SWR_REGISTRY }}/${{ env.SWR_NAMESPACE }}/aiops-server:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.latest == 'true' && format('{0}/{1}/aiops-server:latest', env.SWR_REGISTRY, env.SWR_NAMESPACE) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: agent
          platforms: ${{ env.PLATFORMS }}
          push: true
          provenance: false
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BASE_REGISTRY=docker.io
          tags: |
            ${{ env.SWR_REGISTRY }}/${{ env.SWR_NAMESPACE }}/aiops-agent:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.latest == 'true' && format('{0}/{1}/aiops-agent:latest', env.SWR_REGISTRY, env.SWR_NAMESPACE) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### ✅ 镜像已推送到华为云 SWR"
            echo ""
            echo "| 镜像 | 标签 |"
            echo "|---|---|"
            echo "| \`${SWR_REGISTRY}/${SWR_NAMESPACE}/aiops-server\` | \`${{ steps.meta.outputs.version }}\`${{ steps.meta.outputs.latest == 'true' && ' + `latest`' || '' }} |"
            echo "| \`${SWR_REGISTRY}/${SWR_NAMESPACE}/aiops-agent\` | \`${{ steps.meta.outputs.version }}\`${{ steps.meta.outputs.latest == 'true' && ' + `latest`' || '' }} |"
            echo ""
            echo "架构：\`${PLATFORMS}\`"
          } >> "$GITHUB_STEP_SUMMARY"
