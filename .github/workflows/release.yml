name: Release · Build Binaries & Docker

# 每次推送 v* 标签（如 v6.34.0）→ 自动构建多平台二进制 + 创建 GitHub Release + 构建 Docker 镜像推送到华为云 SWR。
#
# ── 需要在 仓库 Settings → Secrets and variables → Actions 配置 ──
#   HW_ACCESS_KEY  =  <华为云访问密钥 AK>
#   HW_SECRET_KEY  =  <华为云秘密密钥 SK>

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像版本标签（如 v5.5.0）'
        required: true
      push_latest:
        description: '同时更新 :latest 标签'
        type: boolean
        default: true

env:
  SWR_REGISTRY: swr.cn-east-3.myhuaweicloud.com
  SWR_NAMESPACE: sreyun
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: 构建多平台二进制 + 创建 GitHub Release
  # ──────────────────────────────────────────────────────────
  build-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Resolve version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "构建版本: $VERSION"

      - name: Build binaries
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          mkdir -p dist

          # linux/amd64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=$VERSION" -o dist/aiops-server-linux-amd64 ./cmd/server
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=$VERSION" -o dist/aiops-agent-linux-amd64 ./cmd/agent

          # linux/arm64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=$VERSION" -o dist/aiops-server-linux-arm64 ./cmd/server
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=$VERSION" -o dist/aiops-agent-linux-arm64 ./cmd/agent

          # windows/amd64
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=$VERSION" -o dist/aiops-server-windows-amd64.exe ./cmd/server
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=$VERSION" -o dist/aiops-agent-windows-amd64.exe ./cmd/agent

          echo "构建完成:"
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            dist/aiops-server-linux-amd64
            dist/aiops-agent-linux-amd64
            dist/aiops-server-linux-arm64
            dist/aiops-agent-linux-arm64
            dist/aiops-server-windows-amd64.exe
            dist/aiops-agent-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────
  # Job 2: 构建 Docker 镜像并推送到华为云 SWR
  # ──────────────────────────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version + tag list
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
            LATEST="${{ github.event.inputs.push_latest }}"
          else
            VERSION="${GITHUB_REF_NAME}"
            LATEST="true"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "解析到版本: $VERSION (latest=$LATEST)"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate SWR login credential
        id: swr-login
        run: |
          SWR_USERNAME="cn-east-3@${{ secrets.HW_ACCESS_KEY }}"
          SWR_PASSWORD=$(printf '%s' "${{ secrets.HW_ACCESS_KEY }}" | openssl dgst -binary -sha256 -hmac "${{ secrets.HW_SECRET_KEY }}" | od -An -vtx1 | tr -d ' \n')
          echo "username=$SWR_USERNAME" >> "$GITHUB_OUTPUT"
          echo "password=$SWR_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Log in to Huawei SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SWR_REGISTRY }}
          username: ${{ steps.swr-login.outputs.username }}
          password: ${{ steps.swr-login.outputs.password }}

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: server
          platforms: ${{ env.PLATFORMS }}
          push: true
          provenance: false
          sbom: false
          outputs: type=registry,oci-mediatypes=false
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BASE_REGISTRY=docker.io
          tags: |
            ${{ env.SWR_REGISTRY }}/${{ env.SWR_NAMESPACE }}/aiops-server:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.latest == 'true' && format('{0}/{1}/aiops-server:latest', env.SWR_REGISTRY, env.SWR_NAMESPACE) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: agent
          platforms: ${{ env.PLATFORMS }}
          push: true
          provenance: false
          sbom: false
          outputs: type=registry,oci-mediatypes=false
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BASE_REGISTRY=docker.io
          tags: |
            ${{ env.SWR_REGISTRY }}/${{ env.SWR_NAMESPACE }}/aiops-agent:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.latest == 'true' && format('{0}/{1}/aiops-agent:latest', env.SWR_REGISTRY, env.SWR_NAMESPACE) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### ✅ 镜像已推送到华为云 SWR"
            echo ""
            echo "| 镜像 | 标签 |"
            echo "|---|---|"
            echo "| \`${SWR_REGISTRY}/${SWR_NAMESPACE}/aiops-server\` | \`${{ steps.meta.outputs.version }}\`${{ steps.meta.outputs.latest == 'true' && ' + `latest`' || '' }} |"
            echo "| \`${SWR_REGISTRY}/${SWR_NAMESPACE}/aiops-agent\` | \`${{ steps.meta.outputs.version }}\`${{ steps.meta.outputs.latest == 'true' && ' + `latest`' || '' }} |"
            echo ""
            echo "架构：\`${PLATFORMS}\`"
          } >> "$GITHUB_STEP_SUMMARY"
