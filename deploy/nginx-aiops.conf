# ============================================================
# AIOps Monitor · Nginx 反向代理示例
# ------------------------------------------------------------
# 普通监控(指标上报/面板)只需常规反代即可；但【远程终端】用到
# WebSocket 升级 + 长连接实时流，nginx 默认不转发 Upgrade 头、且会缓冲，
# 所以必须加下面标注的几行，否则会出现「指标正常、终端连不上」。
# 这是所有 WebSocket 应用(Grafana/Jupyter/code-server 等)在 nginx 后
# 的标准要求，配置一次即可。
# ============================================================

# WebSocket 升级映射：放在 http {} 层，全局只需一次
# （若已在 nginx.conf 的 http{} 里定义过 $connection_upgrade，勿重复）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    http2  on;
    server_name  monitor.example.com;          # ← 改成你的域名

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;   # ← 你的证书
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # 上传/终端粘贴/端口转发文件传输等——与服务端 maxBodyBytes(100MB) 对齐，
    # 否则经代理的大文件（端口转发 HTTP 隧道）会被 nginx 提前 413 截断。
    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:8529;      # ← AIOps 服务端监听地址

        # ---- 常规反代头（让服务端识别真实域名/协议，安装命令自动用域名）----
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        # 注：服务端默认忽略上面两个 IP 头以防伪造；确认在可信反代后，
        #     请在 server_config.json 设 "trust_proxy": true，才会据此记录
        #     真实客户端 IP 并做登录限流（否则日志/限流基于 127.0.0.1）。

        # ==== 远程终端必需（缺一不可）====================================
        # 1) 转发 WebSocket 升级（浏览器 ⇄ 服务端）——不加则终端「无法连接」
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 2) 关闭缓冲：Agent 反向通道是实时流。服务端已对下行流发
        #    `X-Accel-Buffering: no`，这里对上行(Agent→服务端)再兜底。
        proxy_buffering         off;
        proxy_request_buffering off;

        # 3) 拉长超时：终端会话/长轮询是长连接，默认 60s 会被切断
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        # ================================================================
    }
}

# 可选：80 → 443 跳转
server {
    listen 80;
    server_name monitor.example.com;           # ← 同上
    return 301 https://$host$request_uri;
}
