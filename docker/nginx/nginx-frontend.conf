# ============================================================
# AIOps Monitor · 前端 Nginx 配置
# 静态资源服务 + API/WebSocket 反向代理到后端容器
# ============================================================

# WebSocket 升级映射（全局只需一次）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Gzip 压缩
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css application/javascript application/json image/svg+xml;
gzip_comp_level 6;

# 静态资源缓存
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m max_size=100m inactive=1h;

upstream aiops_backend {
    server backend:8529;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;   # 与服务端 maxBodyBytes(100MB) 对齐，避免大文件经代理被 413

    # ⚠ 本文件面向「前端静态托管 + 后端分离」架构；当前版本前端已 //go:embed 进后端二进制，
    #   推荐直接用 deploy/nginx-aiops.conf（整体反代 8529 + 全局 WS 升级），更简单且不易漏配。

    # ---- 静态资源（前端 SPA）----
    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由回退：所有非文件请求返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # JS/CSS 静态资源带长缓存（文件名不变时生效）
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    # 图标/清单等不变资源
    location ~* \.(svg|ico|png|jpg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # Service Worker：必须无缓存，确保更新及时
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_pass http://aiops_backend;
    }

    # ---- Manifest ----
    location = /manifest.json {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ---- API 反向代理 ----
    location /api/ {
        proxy_pass http://aiops_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 读取超时：某些 API（历史数据）可能较慢
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }

    # ---- WebSocket 推送（P3-1: 实时指标推送）----
    location /ws/ {
        proxy_pass http://aiops_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 关闭缓冲：实时推送不缓冲
        proxy_buffering         off;
        proxy_request_buffering off;

        # 长连接超时
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ---- 远程终端 WebSocket（浏览器 ⇄ 服务端 ⇄ Agent）----
    # 覆盖两类浏览器侧终端 WS：/api/v1/hosts/{id}/terminal 与
    # /api/v1/terminal/sessions/{id}/observe（旁观回放）。二者都需升级 + 关缓冲 + 长超时，
    # 否则会出现「指标正常、终端/旁观连不上」。
    location ~* ^/api/v1/(hosts/[^/]+/terminal|terminal/sessions/[^/]+/observe)$ {
        proxy_pass http://aiops_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 终端必需：关闭缓冲 + 长超时（v5.4.0: 24h 匹配 Agent 会话超时）
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ---- Agent 终端反向通道（Agent ⇄ 服务端）----
    location ~* ^/api/v1/agent/terminal/(wait|rx)$ {
        proxy_pass http://aiops_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Agent 长轮询/流式传输：关闭缓冲 + 长超时（v5.4.0: 24h）
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    location ~* ^/api/v1/agent/terminal/tx$ {
        proxy_pass http://aiops_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # v5.4.0: Agent tx 是长连接流式传输（Agent 持续 POST shell 输出），
        # 必须配置长超时 + 关闭缓冲，否则默认 60s 超时会导致空闲终端被截断。
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ---- 健康检查 ----
    location = /healthz {
        proxy_pass http://aiops_backend;
        access_log off;
    }

    # ---- Agent 安装脚本（动态生成，需后端处理）----
    location ~* ^/(install|uninstall)(-relay)?\.(sh|ps1)$ {
        proxy_pass http://aiops_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # ---- Agent 二进制下载 ----
    location /dl/ {
        proxy_pass http://aiops_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # 大文件下载：拉长超时
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
